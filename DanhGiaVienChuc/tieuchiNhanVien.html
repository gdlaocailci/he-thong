<script>
/**
 * MODULE: QUẢN LÝ TIÊU CHÍ ĐÁNH GIÁ NHÂN VIÊN
 * Tối ưu hóa: Gọi hàm Global AutoResizeTextarea từ index.html
 */
(function() {
    if (document.getElementById('tieuchi-nhanvien-ui')) return;

    const style = document.createElement('style');
    style.textContent = `
        #tieuchi-nhanvien-ui { display: none; margin-top: 0px; background: white; padding: 0px 20px 15px 20px; border-radius: 5px; box-sizing: border-box; overflow-y: visible; }
        
        .tc-nv-header-sticky { 
            position: sticky; 
            top: 77px;
            background: #fff; 
            z-index: 990; 
            padding-top: 5px;
            padding-bottom: 10px; 
            margin-bottom: 10px;  
            border-bottom: 2px solid red;
        }
        
        .tc-nv-tieu-de { color: var(--mau-c); text-transform: uppercase; text-align: center; margin: 0 0 10px 0; padding: 0; font-size: 20px; font-weight: bold; }
        .tc-nv-hanh-dong { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; flex-wrap: wrap; gap: 10px; }
        .tc-nv-nam-hoc { display: flex; align-items: center; gap: 8px; background: #f1f3f5; padding: 5px 12px; border-radius: 6px; }
        .tc-nv-nam-hoc label { font-weight: bold; color: var(--mau-c); margin: 0; }
        .tc-nv-nam-hoc input { border: 1px solid #ccc; border-radius: 4px; padding: 6px 10px; font-family: inherit; width: 130px; text-align: center; }
        
        .table-tieuchi-nv { width: 100%; border-collapse: collapse; margin-top: 0; }
        .table-tieuchi-nv th, .table-tieuchi-nv td { border: 1px solid #dee2e6; padding: 8px 10px; vertical-align: middle; }
        .table-tieuchi-nv th { background: #e9ecef; color: var(--mau-c); font-size: 15px; font-weight: bold; text-align: center; }
        .table-tieuchi-nv td { text-align: left; }
        
        .table-tieuchi-nv textarea {
            width: 100%;
            border: none;
            outline: none;
            background: transparent;
            font-family: inherit;
            font-size: 14px;
            line-height: 1.4;
            padding: 4px 0;
            margin: 0;
            resize: none;
            overflow: hidden !important;
            box-sizing: border-box;
            height: auto;
            min-height: 38px;
            scrollbar-width: none !important;
        }
        .table-tieuchi-nv textarea::-webkit-scrollbar {
            display: none !important;
            width: 0 !important;
            height: 0 !important;
        }
        .table-tieuchi-nv textarea:focus {
            background: #fef9e6;
        }
        
        .td-buttons-nv {
            text-align: center;
            white-space: nowrap;
            width: 50px;
        }
        .btn-di-chuyen-nv, .btn-xoa-dong-nv {
            display: block;
            width: 100%;
            margin: 4px 0;
            padding: 6px 0;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            transition: 0.2s;
            text-align: center;
        }
        .btn-di-chuyen-nv { background: #6c757d; color: white; }
        .btn-di-chuyen-nv:hover { background: #5a6268; }
        .btn-xoa-dong-nv { background: #dc3545; color: white; }
        .btn-xoa-dong-nv:hover { background: #c82333; }
        
        .btn-them-moi-nv { background: #28a745; color: white; border: none; padding: 8px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 15px; transition: 0.2s; }
        .btn-them-moi-nv:hover { background: #218838; }
        .btn-cap-nhat-nv { background: var(--mau-c); color: white; border: none; padding: 8px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 15px; transition: 0.2s; }
        .btn-cap-nhat-nv:hover { background: #004494; transform: translateY(-1px); }
    `;
    document.head.appendChild(style);

    const nvHTML = `
        <div id="tieuchi-nhanvien-ui">
            <div class="tc-nv-header-sticky">
                <h3 class="tc-nv-tieu-de">TIÊU CHÍ ĐÁNH GIÁ NHÂN VIÊN</h3>
                <div class="tc-nv-hanh-dong">
                    <div class="tc-nv-nam-hoc">
                        <label>📅 Năm học:</label>
                        <input type="text" id="tcnv-namhoc" placeholder="VD: 2025-2026" value="">
                    </div>
                    <div style="display: flex; gap: 10px;">
                        <button class="btn-them-moi-nv" onclick="tcnv_ThemDong()">+ Thêm mới</button>
                        <button class="btn-cap-nhat-nv" onclick="tcnv_LuuCapNhat()">CẬP NHẬT (LƯU THAY ĐỔI)</button>
                    </div>
                </div>
            </div>
            <div style="overflow-x: auto; overflow-y: visible;">
                <table class="table-tieuchi-nv">
                    <thead>
                        <tr><th width="7%">Sửa</th><th width="5%">TT</th><th width="28%">Tiêu chí</th><th width="10%">Thang giá trị</th><th width="8%">Quy điểm</th><th width="8%">Xuất sắc</th><th width="8%">HTT</th><th width="8%">Hoàn thành</th><th width="7%">CHT</th></tr>
                    </thead>
                    <tbody id="tcnv-tbody"></tbody>
                </table>
            </div>
        </div>
    `;
    const mainUi = document.getElementById('main-ui');
    if (mainUi) mainUi.insertAdjacentHTML('beforeend', nvHTML);

    const uiNode = document.getElementById('tieuchi-nhanvien-ui');
    if (uiNode) {
        const observer = new MutationObserver(function(mutations) {
            mutations.forEach(function(mutation) {
                if (mutation.attributeName === 'style') {
                    const isVisible = uiNode.style.display === 'block';
                    const kDau = document.querySelector('.k-dau');
                    const sysHeader = document.querySelector('.k-header-sticky');
                    const tcHeader = document.querySelector('.tc-nv-header-sticky');
                    if (isVisible) {
                        if (kDau) { kDau.style.borderBottom = 'none'; kDau.style.paddingBottom = '0px'; kDau.style.marginBottom = '0px'; }
                        if (sysHeader && tcHeader) tcHeader.style.top = sysHeader.offsetHeight + 'px';
                    } else {
                        if (kDau) { kDau.style.borderBottom = ''; kDau.style.paddingBottom = ''; kDau.style.marginBottom = ''; }
                    }
                }
            });
        });
        observer.observe(uiNode, { attributes: true });
    }
})();

var tcnv_DuLieuGoc = [];
var tcnv_NamHocGoc = "";

async function tcnv_TaiDuLieu() {
    if (tcnv_DuLieuGoc && tcnv_DuLieuGoc.length > 0) {
        tcnv_HienThiBang();
        return;
    }

    if (typeof f_x_j === 'function') f_x_j(true);
    try {
        const gasUrl = (typeof DG_CONFIG_GAS_URL !== 'undefined') ? DG_CONFIG_GAS_URL : "";
        const response = await fetchAPI(gasUrl + "?z_p_a=get_tieuchi_nhanvien");
        if (response.status === 'success') {
            tcnv_DuLieuGoc = response.data || [];
            if (response.nam_hoc !== undefined && response.nam_hoc !== null) {
                tcnv_NamHocGoc = response.nam_hoc;
                const inpNam = document.getElementById('tcnv-namhoc');
                if (inpNam) inpNam.value = response.nam_hoc;
            }
            tcnv_HienThiBang();
        } else {
            hienThiThongBaoUI("Lỗi tải tiêu chí nhân viên: " + (response.message || "Không xác định"));
        }
    } catch (err) {
        hienThiThongBaoUI("Mất kết nối khi tải danh sách tiêu chí nhân viên.");
    }
    if (typeof f_x_j === 'function') f_x_j(false);
}

function tcnv_HienThiBang() {
    const tbody = document.getElementById('tcnv-tbody');
    if (!tbody) return;
    tbody.innerHTML = '';
    tcnv_DuLieuGoc.forEach((item, idx) => {
        tbody.insertAdjacentHTML('beforeend', tcnv_TaoDong(idx, item));
    });
    if (typeof f_x_auto_resize_textarea === 'function') f_x_auto_resize_textarea('tcnv-tbody');
}

function tcnv_TaoDong(index, item) {
    const tieu_chi = escapeHtml(item.tieu_chi || '');
    const thang_gia_tri = escapeHtml(item.thang_gia_tri || '');
    const quy_diem = escapeHtml(item.quy_diem || '');
    const xuat_sac = escapeHtml(item.xuat_sac || '');
    const htt = escapeHtml(item.htt || '');
    const hoan_thanh = escapeHtml(item.hoan_thanh || '');
    const cht = escapeHtml(item.cht || '');
    
    return `<tr>
        <td class="td-buttons-nv">
            <button class="btn-di-chuyen-nv" onclick="tcnv_DiChuyen(this, 'up')" title="Di chuyển lên">▲</button>
            <button class="btn-xoa-dong-nv" onclick="tcnv_XoaDong(this)">Xóa</button>
            <button class="btn-di-chuyen-nv" onclick="tcnv_DiChuyen(this, 'down')" title="Di chuyển xuống">▼</button>
        </td>
        <td class="tcnv-stt" style="text-align:center">${index+1}</td>
        <td><textarea class="tcnv-tieuchi" rows="1" placeholder="Nhập tiêu chí">${tieu_chi}</textarea></td>
        <td><textarea class="tcnv-thang" rows="1" placeholder="VD: 0-10">${thang_gia_tri}</textarea></td>
        <td><textarea class="tcnv-quydiem" rows="1" placeholder="Điểm tối đa">${quy_diem}</textarea></td>
        <td><textarea class="tcnv-xuatsac" rows="1" placeholder="Mức xuất sắc">${xuat_sac}</textarea></td>
        <td><textarea class="tcnv-htt" rows="1" placeholder="HTT">${htt}</textarea></td>
        <td><textarea class="tcnv-hoanthanh" rows="1" placeholder="Hoàn thành">${hoan_thanh}</textarea></td>
        <td><textarea class="tcnv-cht" rows="1" placeholder="CHT">${cht}</textarea></td>
    </tr>`;
}

function tcnv_DiChuyen(btn, direction) {
    const row = btn.closest('tr');
    const tbody = row.parentNode;
    const rows = Array.from(tbody.children);
    const currentIndex = rows.indexOf(row);
    
    if (direction === 'up' && currentIndex > 0) {
        tbody.insertBefore(row, rows[currentIndex - 1]);
    } else if (direction === 'down' && currentIndex < rows.length - 1) {
        tbody.insertBefore(row, rows[currentIndex + 2]);
    } else {
        return;
    }
    tcnv_CapNhatSTT();
    if (typeof f_x_auto_resize_textarea === 'function') f_x_auto_resize_textarea('tcnv-tbody');
}

function tcnv_ThemDong() {
    const tbody = document.getElementById('tcnv-tbody');
    const emptyItem = { tieu_chi: '', thang_gia_tri: '', quy_diem: '', xuat_sac: '', htt: '', hoan_thanh: '', cht: '' };
    tbody.insertAdjacentHTML('afterbegin', tcnv_TaoDong(0, emptyItem));
    tcnv_CapNhatSTT();
    if (typeof f_x_auto_resize_textarea === 'function') f_x_auto_resize_textarea('tcnv-tbody');
}

function tcnv_XoaDong(btn) {
    if (confirm("Xóa tiêu chí này khỏi danh sách?")) {
        btn.closest('tr').remove();
        tcnv_CapNhatSTT();
        if (typeof f_x_auto_resize_textarea === 'function') f_x_auto_resize_textarea('tcnv-tbody');
    }
}

function tcnv_CapNhatSTT() {
    const tbody = document.getElementById('tcnv-tbody');
    if (!tbody) return;
    Array.from(tbody.children).forEach((tr, idx) => {
        const sttCell = tr.querySelector('.tcnv-stt');
        if (sttCell) sttCell.innerText = idx + 1;
    });
}

async function tcnv_LuuCapNhat() {
    const tbody = document.getElementById('tcnv-tbody');
    const newData = [];
    
    Array.from(tbody.children).forEach(tr => {
        const tieu_chi = tr.querySelector('.tcnv-tieuchi')?.value.trim() || '';
        if (tieu_chi !== '') {
            newData.push({
                tieu_chi: tieu_chi,
                thang_gia_tri: tr.querySelector('.tcnv-thang')?.value.trim() || '',
                quy_diem: tr.querySelector('.tcnv-quydiem')?.value.trim() || '',
                xuat_sac: tr.querySelector('.tcnv-xuatsac')?.value.trim() || '',
                htt: tr.querySelector('.tcnv-htt')?.value.trim() || '',
                hoan_thanh: tr.querySelector('.tcnv-hoanthanh')?.value.trim() || '',
                cht: tr.querySelector('.tcnv-cht')?.value.trim() || ''
            });
        }
    });
    
    const namHocMoi = document.getElementById('tcnv-namhoc')?.value.trim() || '';
    const dataChanged = JSON.stringify(tcnv_DuLieuGoc) !== JSON.stringify(newData);
    const yearChanged = tcnv_NamHocGoc !== namHocMoi;
    
    if (!dataChanged && !yearChanged) {
        hienThiThongBaoUI("Không có thay đổi nào để lưu.");
        return;
    }
    
    const overlay = document.getElementById("o-luu-overlay");
    if (overlay) overlay.style.display = "flex";
    try {
        const gasUrl = (typeof DG_CONFIG_GAS_URL !== 'undefined') ? DG_CONFIG_GAS_URL : "";
        await fetch(gasUrl, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({ 
                action: 'luu_tieuchi_nhanvien', 
                data: newData,
                nam_hoc: namHocMoi
            })
        });
        setTimeout(() => {
            if (overlay) overlay.style.display = "none";
            tcnv_ThongBaoThanhCong("Đã cập nhật bảng tiêu chí nhân viên và năm học thành công!");
            tcnv_DuLieuGoc = []; 
            tcnv_TaiDuLieu();
        }, 1500);
    } catch (err) {
        if (overlay) overlay.style.display = "none";
        hienThiThongBaoUI("Lỗi kết nối khi lưu dữ liệu nhân viên. Vui lòng thử lại.");
    }
}

function tcnv_ThongBaoThanhCong(noiDung) {
    const hopThongBao = document.getElementById("o-thong-bao");
    if (hopThongBao) {
        const divs = hopThongBao.getElementsByTagName("div");
        const nutXacNhan = hopThongBao.getElementsByTagName("button")[0];
        if (divs.length >= 2 && nutXacNhan) {
            const tieuDeGoc = divs[0].innerHTML;
            const noiDungGoc = divs[1].innerHTML;
            const hamDongGoc = nutXacNhan.onclick;
            divs[0].innerHTML = "CẬP NHẬT THÀNH CÔNG";
            divs[1].innerHTML = noiDung;
            hopThongBao.style.display = "flex";
            nutXacNhan.onclick = function() {
                hopThongBao.style.display = "none";
                divs[0].innerHTML = tieuDeGoc;
                divs[1].innerHTML = noiDungGoc;
                nutXacNhan.onclick = hamDongGoc;
            };
        }
    } else {
        alert(noiDung);
    }
}

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}

if (typeof window.tcnv_TaiDuLieu === 'undefined') {
    window.tcnv_TaiDuLieu = tcnv_TaiDuLieu;
    window.tcnv_ThemDong = tcnv_ThemDong;
    window.tcnv_XoaDong = tcnv_XoaDong;
    window.tcnv_LuuCapNhat = tcnv_LuuCapNhat;
    window.tcnv_DiChuyen = tcnv_DiChuyen;
}
</script>
