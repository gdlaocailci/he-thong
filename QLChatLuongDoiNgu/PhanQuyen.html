<style>
  /* Cấu hình tăng cỡ chữ độc lập cho bảng Phân quyền */
  #bangPhanQuyen th, 
  #bangPhanQuyen td {
    font-size: 15px !important; 
  }
  
  /* Tăng cỡ chữ cho các ô nhập liệu và tiêu đề trong Form (Email, CCCD, Quyền...) */
  #modalPhanQuyen .form-label {
    font-size: 15px !important;
  }
  #modalPhanQuyen .form-control,
  #modalPhanQuyen .form-select {
    font-size: 15px !important;
    padding: 8px 12px !important; /* Tăng độ rộng ô nhập liệu để dễ quan sát hơn */
  }
</style>

<div class="tab-pane fade" id="muc4">
  <div class="row mb-2 mt-2 g-1 align-items-center">
    <div class="col-md-5">
      <div class="input-group">
        <input type="text" id="nhapTimKiemPq" class="form-control" placeholder="Tìm kiếm tên/email/mã..." autocomplete="off" onkeypress="if(event.keyCode===13) { veBangPhanQuyen(); return false; }">
        <button type="button" class="btn btn-outline-secondary fw-bold" onclick="veBangPhanQuyen()"><i class="fas fa-search"></i> Lọc</button>
      </div>
    </div>
    <div class="col-md-7 text-end">
      <button class="btn btn-primary fw-bold me-1" onclick="moThemTaiKhoan()"><i class="fas fa-plus"></i> Thêm tài khoản</button>
      <button class="btn btn-success fw-bold" onclick="capNhatPhanQuyen()"><i class="fas fa-save"></i> Cập nhật hệ thống</button>
    </div>
  </div>
  
  <div class="table-responsive bg-white rounded shadow-sm border p-0" style="max-height: calc(100vh - 190px); overflow-y: auto;">
    <table class="table table-bordered table-hover bangTchinh mb-0" id="bangPhanQuyen" style="border-collapse: collapse;">
      <thead class="sticky-top" style="z-index: 10;">
        <tr>
          <th style="width: 50px;">Sửa</th>
          <th style="width: 50px;">STT</th>
          <th>Địa chỉ Email</th>
          <th>Họ và tên</th>
          <th>Mã cá biệt (CCCD)</th>
          <th>Quyền</th>
        </tr>
      </thead>
      <tbody>
        </tbody>
    </table>
  </div>
</div>

<div class="modal fade" id="modalPhanQuyen" tabindex="-1" data-bs-backdrop="static">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header bg-primary text-white py-2">
        <h5 class="modal-title fw-bold" id="tdeModalPq">Thêm tài khoản</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="pq_chiSoSua" value="-1">
        <div class="mb-3">
          <label class="form-label fw-bold">Địa chỉ (Email) <span class="text-danger">*</span></label>
          <input type="email" class="form-control" id="pq_diaChi" placeholder="VD: ngvna@gmail.com">
        </div>
        <div class="mb-3">
          <label class="form-label fw-bold">Họ và tên <span class="text-danger">*</span></label>
          <input type="text" class="form-control" id="pq_hoTen" placeholder="VD: Nguyễn Văn A">
        </div>
        <div class="mb-3">
          <label class="form-label fw-bold">Mã cá biệt (CCCD) <span class="text-danger">*</span></label>
          <input type="text" class="form-control" id="pq_cccd" placeholder="VD: 010099001234">
        </div>
        <div class="mb-3">
          <label class="form-label fw-bold">Quyền hạn <span class="text-danger">*</span></label>
          <select class="form-select" id="pq_quyen">
            <option value="">Chỉ xem (Để trống)</option>
            <option value="x">Cập nhật cá nhân (x)</option>
            <option value="xx">Quản trị viên (xx)</option>
          </select>
        </div>
      </div>
      <div class="modal-footer py-2 border-0 justify-content-center">
        <button type="button" class="btn btn-secondary px-3" data-bs-dismiss="modal">Hủy</button>
        <button type="button" class="btn btn-danger px-3" id="nutXoaPq" onclick="xoaTamTaiKhoan()">Xóa</button>
        <button type="button" class="btn btn-primary px-3" onclick="luuTamTaiKhoan()">Lưu tạm</button>
      </div>
    </div>
  </div>
</div>

<script>
  let mangPhanQuyen = [];
  let theModalPq = null;
  let daTaiPhanQuyen = false; 

  // Hàm toàn cục xóa dấu phục vụ cho Lọc tìm kiếm
  if (typeof window.xoaDauVN !== 'function') {
      window.xoaDauVN = function(str) {
          if (!str) return "";
          return String(str).normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/đ/g, "d").replace(/Đ/g, "D").toLowerCase();
      };
  }

  function layModalPq() {
      if (!theModalPq) {
          theModalPq = new bootstrap.Modal(document.getElementById('modalPhanQuyen'));
      }
      return theModalPq;
  }

  function taiDsPhanQuyen() {
    if (!ndHtai || ndHtai.vTro !== 'qtriv') return;
    
    if (daTaiPhanQuyen) {
        veBangPhanQuyen();
        return;
    }

    $("#vungTai").show();
    goiMyChuHien('layDsTaiKhoan', { vTro: ndHtai.vTro })
      .then(q => {
        if (q.tCong) {
          mangPhanQuyen = q.dLieu || [];
          daTaiPhanQuyen = true; 
          veBangPhanQuyen();
        } else {
          hienTbao(q.tBao, 'loi');
        }
        $("#vungTai").hide();
      })
      .catch(lc => { hienTbao(lc, 'loi'); $("#vungTai").hide(); });
  }

  function veBangPhanQuyen() {
    let tk = $("#nhapTimKiemPq").length ? window.xoaDauVN($("#nhapTimKiemPq").val()) : "";
    let html = '';
    let dem = 0;

    if (mangPhanQuyen.length === 0) {
      html = '<tr><td colspan="6" class="text-center text-muted py-3">Chưa có dữ liệu.</td></tr>';
    } else {
      // Ưu tiên dòng chưa lưu nổi lên đầu
      mangPhanQuyen.sort((a, b) => {
          if (a.ckt && !b.ckt) return -1;
          if (!a.ckt && b.ckt) return 1;
          return 0;
      });

      mangPhanQuyen.forEach((tkObj, i) => {
        // Áp dụng thuật toán Lọc tương đối không dấu
        if(tk && !window.xoaDauVN(tkObj.join(" ")).includes(tk)) return;
        dem++;

        let q = String(tkObj[2] || "").trim().toLowerCase();
        
        let tenQuyen = '<span class="badge bg-warning text-dark">Chỉ xem</span>';
        if (q === 'xx') {
            tenQuyen = '<span class="badge bg-danger">Quản trị viên</span>';
        } else if (q === 'x') {
            tenQuyen = '<span class="badge bg-secondary">Cập nhật cá nhân</span>';
        }

        let cdG = tkObj.ckt ? "dongCkt" : ""; 
        let cpT = tkObj.ckt ? " <i class='fas fa-pen text-danger' title='Chưa lưu'></i>" : "";

        html += `<tr class="${cdG}">
          <td><button class="btn btn-sm btn-outline-primary" onclick="moSuaTaiKhoan(${i})"><i class="fas fa-edit"></i></button></td>
          <td class="text-center">${dem}</td>
          <td class="text-start fw-bold text-primary">${tkObj[0]}</td>
          <td class="text-start">${tkObj[1]}${cpT}</td>
          <td class="text-center fw-bold text-success">${tkObj[3] || ''}</td>
          <td class="text-center">${tenQuyen}</td>
        </tr>`;
      });
      
      if (dem === 0) {
          html = '<tr><td colspan="6" class="text-center text-danger py-3">Không tìm thấy tài khoản phù hợp.</td></tr>';
      }
    }
    $("#bangPhanQuyen tbody").html(html);
  }

  function moThemTaiKhoan() {
    $("#tdeModalPq").text("Thêm tài khoản");
    $("#pq_chiSoSua").val(-1);
    $("#pq_diaChi").val('');
    $("#pq_hoTen").val('');
    $("#pq_cccd").val('');
    $("#pq_quyen").val(''); 
    $("#nutXoaPq").hide(); 
    layModalPq().show();
  }

  function moSuaTaiKhoan(i) {
    $("#tdeModalPq").text("Sửa tài khoản");
    $("#pq_chiSoSua").val(i);
    $("#pq_diaChi").val(mangPhanQuyen[i][0]);
    $("#pq_hoTen").val(mangPhanQuyen[i][1]);
    $("#pq_cccd").val(mangPhanQuyen[i][3] || "");
    
    let q = String(mangPhanQuyen[i][2] || "").trim().toLowerCase();
    $("#pq_quyen").val(q);
    
    $("#nutXoaPq").show(); 
    layModalPq().show();
  }

  function xoaTamTaiKhoan() {
    let cs = parseInt($("#pq_chiSoSua").val());
    if (cs !== -1) {
      if (confirm('Đồng chí có chắc chắn muốn xóa tài khoản này khỏi danh sách?')) {
        mangPhanQuyen.splice(cs, 1);
        veBangPhanQuyen();
        layModalPq().hide();
        hienTbao('Đã xóa khỏi bộ nhớ tạm. Nhớ bấm Cập nhật hệ thống để lưu chính thức!', 'tc');
      }
    }
  }

  function luuTamTaiKhoan() {
    let dChi = $("#pq_diaChi").val().trim().toLowerCase();
    let hTen = $("#pq_hoTen").val().trim();
    let cccd = $("#pq_cccd").val().trim();
    let quyen = $("#pq_quyen").val().trim().toLowerCase();
    let cs = parseInt($("#pq_chiSoSua").val());

    if (dChi === '' || hTen === '' || cccd === '') {
      hienTbao('Vui lòng điền đầy đủ Địa chỉ Email, Họ tên và Mã cá biệt (CCCD)!', 'loi');
      return;
    }

    // CẬP NHẬT: KIỂM TRA TRÙNG LẶP (Chỉ báo lỗi nếu trường đó bị thay đổi và trùng với người khác)
    let biTrungCCCD = false;
    let biTrungTen = false;
    let biTrungEmail = false;

    if (cs !== -1) { 
       // Chế độ Sửa
       let dChiCu = String(mangPhanQuyen[cs][0] || "").trim().toLowerCase();
       if (dChi !== dChiCu) biTrungEmail = mangPhanQuyen.some((tk, i) => i !== cs && String(tk[0]).trim().toLowerCase() === dChi);

       let cccdCu = String(mangPhanQuyen[cs][3] || "").trim();
       if (cccd !== cccdCu) biTrungCCCD = mangPhanQuyen.some((tk, i) => i !== cs && String(tk[3]).trim() === cccd);
       
       let tenCu = String(mangPhanQuyen[cs][1] || "").trim().toLowerCase();
       if (hTen.toLowerCase() !== tenCu) biTrungTen = mangPhanQuyen.some((tk, i) => i !== cs && String(tk[1]).trim().toLowerCase() === hTen.toLowerCase());
    } else { 
       // Chế độ Thêm mới
       biTrungEmail = mangPhanQuyen.some(tk => String(tk[0]).trim().toLowerCase() === dChi);
       biTrungCCCD = mangPhanQuyen.some(tk => String(tk[3]).trim() === cccd);
       biTrungTen = mangPhanQuyen.some(tk => String(tk[1]).trim().toLowerCase() === hTen.toLowerCase());
    }

    if (biTrungEmail) return hienTbao('Địa chỉ Email này đã tồn tại. Không cho phép trùng lặp!', 'loi');
    if (biTrungCCCD) return hienTbao('Mã cá biệt (CCCD) này đã tồn tại. Không cho phép trùng lặp!', 'loi');
    if (biTrungTen) return hienTbao('Họ và tên này đã tồn tại. Không cho phép trùng lặp!', 'loi');

    let rowData = [dChi, hTen, quyen, cccd];
    rowData.ckt = true; // Cờ đánh dấu chưa lưu

    if (cs === -1) {
      mangPhanQuyen.unshift(rowData); // Đẩy lên đầu danh sách
    } else {
      mangPhanQuyen[cs] = rowData;
    }

    veBangPhanQuyen();
    layModalPq().hide();
    hienTbao('Đã lưu vào bộ nhớ tạm. Nhớ bấm Cập nhật hệ thống để lưu chính thức!', 'tc');
  }

  function capNhatPhanQuyen() {
    if (!confirm('Hệ thống sẽ ghi đè toàn bộ danh sách phân quyền mới này. Đồng chí có chắc chắn tiếp tục?')) return;
    
    $("#vungTai").show();
    goiMyChuHien('luuPhanQuyen', { mangTKhoan: mangPhanQuyen, vTro: ndHtai.vTro })
      .then(q => {
        if (q.tCong) {
          hienTbao(q.tBao, 'tc');
        } else {
          hienTbao(q.tBao, 'loi');
        }
        $("#vungTai").hide();
      })
      .catch(lc => { hienTbao(lc, 'loi'); $("#vungTai").hide(); });
  }
</script>
