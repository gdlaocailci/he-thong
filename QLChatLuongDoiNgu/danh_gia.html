<div id="modal_xem_tep" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 100000;">
  <div style="background: white; width: 95%; height: 90vh; max-width: 1200px; border-radius: 8px; display: flex; flex-direction: column; padding: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.2);">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border-bottom: 2px solid #1e3a8a; padding-bottom: 8px;">
      <span style="font-weight: bold; color: #1e3a8a; font-size: 16px;"><i class="fas fa-file-alt"></i> XEM TRƯỚC TÀI LIỆU</span>
      <div style="display: flex; gap: 10px; align-items: center;">
        <button id="btn_tai_tep_preview" onclick="taiTepDangXem()" class="btn btn-primary fw-bold" style="min-width: 105px; padding: 5px 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">📥 TẢI VỀ</button>
        <button onclick="dongKhungXemTep()" class="btn btn-danger fw-bold" style="padding: 5px 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">✖ ĐÓNG</button>
      </div>
    </div>
    <div style="flex-grow: 1; position: relative; background: #f8f9fa; border-radius: 4px; overflow: hidden; border: 1px solid #dee2e6;">
      <iframe id="iframe_xem_tep" src="" style="width: 100%; height: 100%; border: none;" allowfullscreen></iframe>
      <div id="mask_che_nut_drive" style="position: absolute; top: 0; right: 0; width: 65px; height: 55px; background: transparent; z-index: 10; display: none; cursor: not-allowed;" title="Chức năng mở thẻ mới đã bị vô hiệu hóa"></div>
    </div>
  </div>
</div>
<iframe id="iframe_tai_ngam" style="display: none;"></iframe>
<script>
    if (typeof window.xoaDauVN !== 'function') {
        window.xoaDauVN = function(str) {
            if (!str) return "";
            return String(str).normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/đ/g, "d").replace(/Đ/g, "D").toLowerCase();
        };
    }

function veBangDg() {
       const nl = $("#nhapLocN2").val(); 
       const tk = window.xoaDauVN($("#nhapTimKiemDg").val()); 
       const vb = $("#khuBangDg tbody"); 
       vb.empty();
       
       if (!dlToanc || dlToanc.length === 0) return;
       
       // --- NÂNG CẤP: Thuật toán xác định ẩn toàn bộ cột Sửa ---
       let isKhoaHT = (window.dangKhoaHeThong === true || window.dangKhoaHeThong === "true");
       let anCotSua = false;
       if (ndHtai) {
           if (ndHtai.vTro === 'xem') anCotSua = true;
           if (isKhoaHT && ndHtai.vTro !== 'qtriv') anCotSua = true;
       }

       // Can thiệp DOM để ẩn/hiện thẻ <th> của cột Sửa
       if (anCotSua) {
           $("#khuBangDg thead th:first-child").hide();
       } else {
           $("#khuBangDg thead th:first-child").show();
       }
       // ---------------------------------------------------------

       dlToanc.sort((a, b) => {
           if (a.cktdg && !b.cktdg) return -1;
           if (!a.cktdg && b.cktdg) return 1;

           let nA = String(a[0] || "").trim(), nB = String(b[0] || "").trim();
           if (nA !== nB) return nB.localeCompare(nA); 
           
           let htA = String(a[1] || "").trim().split(' '), tA = htA[htA.length - 1].toLowerCase();
           let htB = String(b[1] || "").trim().split(' '), tB = htB[htB.length - 1].toLowerCase();
           
           if (tA !== tB) return tA.localeCompare(tB, 'vi'); 
           return String(a[1] || "").trim().localeCompare(String(b[1] || "").trim(), 'vi'); 
       });

       let sttDg = 1; 
       let htmlRenderDg = []; 
       
       let mcbND = ndHtai.mcb ? String(ndHtai.mcb).trim() : "KHONG_XAC_DINH";

       dlToanc.forEach((dg, idx) => {
          let nc = String(dg[0]).trim();
          if(nl && nc !== String(nl).trim()) return;
          if(tk && !window.xoaDauVN(dg.join(" ")).includes(tk)) return;
          if(dg[4] === "Đã chuyển") return; 
          
          let mcbHS = String(dg[26] || "").trim();
          let cqS = false;
          if (ndHtai.vTro === 'qtriv' || ndHtai.vTro === 'admin_xx') {
              cqS = true;
          } else if (ndHtai.vTro === 'ngdung' && mcbND !== "" && mcbND !== "KHONG_XAC_DINH" && mcbND === mcbHS) {
              cqS = true;
          }
          
          if ((isKhoaHT && ndHtai.vTro !== 'qtriv') || ndHtai.vTro === 'xem') {
              cqS = false;
          }

          let ns = cqS ? `<button class="btn btn-sm btn-success py-0" onclick="moSuaDg(${idx})"><i class="fas fa-edit"></i></button>` : '';
          let dlC = dg.cktdg ? "dongCkt" : ""; 
          let tcP = dg.cktdg ? " <i class='fas fa-pen text-danger' title='Chưa lưu'></i>" : "";

          let lk = dg[31] || "";
          let dsL = lk.split(',').map(l => l.trim()).filter(l => l !== "");
          let htiGhim = dsL.length > 0 ? `<div class="vungGhimLink mt-1" id="vungGhim_${idx}">${dsL.map((u, i) => `<a href="javascript:void(0)" onclick="moKhungXemTep('${u}')" style="margin-right: 12px; display: inline-block; text-decoration: none; font-weight: bold; border-bottom: 1px solid #0d6efd; padding-bottom: 1px;">📎${i+1}</a>`).join('')}</div>` : "";
         
          // --- NÂNG CẤP: Lược bỏ thẻ <td> nếu cờ ẩn được bật ---
          let theTdSua = anCotSua ? '' : `<td class="text-center">${ns}</td>`;
          // -----------------------------------------------------

          htmlRenderDg.push(`
            <tr class="${dlC}">
              ${theTdSua}
              <td class="text-center fw-bold text-muted">${sttDg++}</td>
              <td class="text-center fw-bold">${dg[0]}</td>
              <td class="text-start">
                <div class="tenNhanSu" onclick="latGhim(${idx})">${dg[1]} ${tcP}</div>
                ${htiGhim}
              </td>
              <td>${dg[2]||''}</td>
              <td>${dg[17]||''}</td>
              <td>${dg[18]||''}</td>
              <td>${dg[19]||''}</td>
              <td>${dg[20]||''}</td>
              <td>${dg[21]||''}</td>
              <td>${dg[22]||''}</td>
              <td>${dg[23]||''}</td>
              <td>${dg[24]||''}</td>
              <td>${dg[25]||''}</td>
           </tr>
          `);
       });

       vb.html(htmlRenderDg.join(''));
    }

    function latGhim(idx) {
        $(`#vungGhim_${idx}`).slideToggle(200);
    }

    function moSuaDg(idx) {
       csSua = idx; const dr = dlToanc[idx]; $("#vungNamDg").text(dr[0]); $("#vungTenDg").text(dr[1]); $("#vungMsoDg").val(dr[1]);
       const fr = document.getElementById("bmDgia"); fr.reset();
       
       fr.elements['w'].value = dr[17]||""; // XL CM K1
       fr.elements['x'].value = dr[18]||""; // XL CM K2
       fr.elements['y'].value = dr[19]||""; // XL CNN
       fr.elements['z'].value = dr[20]||""; // XL VC
       fr.elements['ad'].value = dr[21]||""; // XL Đảng viên
       fr.elements['aa'].value = dr[22]||""; // DH Chuyên môn
       fr.elements['ab'].value = dr[23]||""; // DH Thi đua
       fr.elements['ac'].value = dr[24]||""; // Hình thức khen
       fr.elements['ae'].value = dr[25]||""; // Cấp khen
       
       let lk = dr[31] || "";
       $("#mcLinkDg").val(lk);
       veGhimModal(lk);

       $("#hopThoaiDg").modal('show');
    }

    function goMinhChungDg(btn) {
        try {
            let lHtai = $("#mcLinkDg").val();
            if (typeof window.NS_OpenUploadModal === 'function') {
                // Truyền chuỗi rỗng để kích hoạt tính năng tự động nhận diện từ Server
                window.NS_OpenUploadModal(btn, lHtai, "", false); 
            } else {
                hienTbao("Lỗi hệ thống: Module minh chứng chưa tải thành công! Vui lòng F5 lại trang.", "loi");
            }
        } catch (loi) {
            hienTbao("Lỗi hiển thị cửa sổ: " + loi.message, "loi");
        }
    }

    function veGhimModal(lk) {
        let d = lk.split(',').map(l => l.trim()).filter(l => l !== "");
        // KHÔNG ÁP DỤNG XEM TRƯỚC: Cửa sổ nhập liệu vẫn giữ thuộc tính target="_blank" để mở tab mới
        let h = d.map((u, i) => `<a href="${u}" target="_blank" class="text-danger ms-1" title="Link ${i+1}"><i class="fas fa-paperclip"></i></a>`).join('');
        $("#hthiGhimModal").html(h);
    }

    function guiBmDg() {
       const fd = document.getElementById("bmDgia");
       if (csSua !== -1) {
           dlToanc[csSua][17] = fd.elements['w'].value; 
           dlToanc[csSua][18] = fd.elements['x'].value; 
           dlToanc[csSua][19] = fd.elements['y'].value; 
           dlToanc[csSua][20] = fd.elements['z'].value; 
           dlToanc[csSua][21] = fd.elements['ad'].value;   
           dlToanc[csSua][22] = fd.elements['aa'].value;   
           dlToanc[csSua][23] = fd.elements['ab'].value;   
           dlToanc[csSua][24] = fd.elements['ac'].value;   
           dlToanc[csSua][25] = fd.elements['ae'].value;   
           
           dlToanc[csSua][31] = $("#mcLinkDg").val();

           dlToanc[csSua].cktdg = true; veBangDg(); $("#hopThoaiDg").modal('hide'); hienTbao("Đã lưu tạm thời. Nhấn Cập Nhật để ghi dữ liệu.", 'tc');
       }
    }
    
    function cnNhieuDg() {
       const dc = dlToanc.filter(r => r.cktdg);
       if(dc.length===0) return hienTbao("Không có dữ liệu đánh giá mới!", 'loi');
       $("#vungTai").show();
       goiMyChuHien('luuNhieuDgia', {mangDl: dc, vTro: ndHtai.vTro, mcb: ndHtai.mcb})
         .then(g => { hienTbao(g.tBao, g.tCong ? 'tc' : 'loi'); if(g.tCong) taiDlBdau(); else $("#vungTai").hide(); })
         .catch(le => { hienTbao(le, 'loi'); $("#vungTai").hide(); });
    }

    /* ========================================================================== */
    /* KHỐI XỬ LÝ NHÚNG TÀI LIỆU VÀ TẢI XUỐNG DÀNH RIÊNG CHO BẢNG ĐÁNH GIÁ        */
    /* ========================================================================== */
    let urlTepXemTruocHienTai = ""; 

    function moKhungXemTep(duong_dan) {
      if (!duong_dan) return;
      urlTepXemTruocHienTai = String(duong_dan).trim(); 
      let link_nhung = urlTepXemTruocHienTai;
      
      let khop_id = link_nhung.match(/(?:id=|folders\/|d\/)([-\w]{25,})/);
      let mat_na = document.getElementById('mask_che_nut_drive');

      if (khop_id) {
          if (link_nhung.includes("drive.google.com")) {
              link_nhung = "https://drive.google.com/file/d/" + khop_id[1] + "/preview";
              if (mat_na) mat_na.style.display = 'block';
          } else if (link_nhung.includes("docs.google.com/document")) {
              link_nhung = "https://docs.google.com/document/d/" + khop_id[1] + "/preview";
              if (mat_na) mat_na.style.display = 'none';
          } else if (link_nhung.includes("docs.google.com/spreadsheets")) {
              link_nhung = "https://docs.google.com/spreadsheets/d/" + khop_id[1] + "/preview";
              if (mat_na) mat_na.style.display = 'none';
          }
      }

      document.getElementById('iframe_xem_tep').src = link_nhung;
      document.getElementById('modal_xem_tep').style.display = 'flex';
    }

    function dongKhungXemTep() {
      document.getElementById('modal_xem_tep').style.display = 'none';
      document.getElementById('iframe_xem_tep').src = ''; 
      urlTepXemTruocHienTai = ""; 
    }

    function taiTepDangXem() {
      if (!urlTepXemTruocHienTai) return;
      
      let nutTai = document.getElementById('btn_tai_tep_preview');
      let chuGoc = nutTai ? nutTai.innerHTML : "";
      if (nutTai) {
          nutTai.innerHTML = "⏳ ĐANG KẾT NỐI...";
          nutTai.disabled = true;
          nutTai.classList.replace('btn-primary', 'btn-warning'); 
      }

      let khop_id = urlTepXemTruocHienTai.match(/(?:id=|folders\/|d\/)([-\w]{25,})/);
      let link_tai_truc_tiep = urlTepXemTruocHienTai;

      if (khop_id) {
          if (urlTepXemTruocHienTai.includes("drive.google.com")) link_tai_truc_tiep = "https://drive.google.com/uc?export=download&id=" + khop_id[1];
          else if (urlTepXemTruocHienTai.includes("docs.google.com/document")) link_tai_truc_tiep = "https://docs.google.com/document/d/" + khop_id[1] + "/export?format=docx";
          else if (urlTepXemTruocHienTai.includes("docs.google.com/spreadsheets")) link_tai_truc_tiep = "https://docs.google.com/spreadsheets/d/" + khop_id[1] + "/export?format=xlsx";
      }

      let khung_tai_ngam = document.getElementById('iframe_tai_ngam');
      if (khung_tai_ngam) khung_tai_ngam.src = link_tai_truc_tiep;

      if (nutTai) {
          setTimeout(() => {
              nutTai.innerHTML = chuGoc;
              nutTai.disabled = false;
              nutTai.classList.replace('btn-warning', 'btn-primary'); 
          }, 2500); 
      }
    }
</script>
