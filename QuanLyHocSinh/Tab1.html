<div class="tab-pane fade show active" id="tab1">
  <div class="text-center"><h4>QUẢN LÝ THÔNG TIN HỌC SINH</h4></div>
  <div class="filter-box">
    <div class="row g-2 align-items-end">
      <div class="col-md-1"><label>Năm học</label><select id="t1_nam" class="form-select form-select-sm fw-bold text-primary"></select></div>
      <div class="col-md-1"><label>Lớp</label><select id="t1_lop" class="form-select form-select-sm fw-bold text-primary"></select></div>
      <div class="col-md-2"><label>CCCD</label><input id="t1_cccd" class="form-control form-control-sm" placeholder="Nhập..."></div>
      <div class="col-md-2"><label>Họ đệm</label><input id="t1_hodem" class="form-control form-control-sm"></div>
      <div class="col-md-2"><label>Tên</label><input id="t1_ten" class="form-control form-control-sm"></div>
      
      <div class="col-md-4 d-flex flex-wrap justify-content-end align-items-center gap-2">
        <button class="btn btn-sm btn-danger fw-bold px-3" id="btnLenLop" onclick="hks_nhanBanLenLop_fn()" style="display:none"><i class="bi bi-rocket-takeoff"></i> Nhân bản lên lớp</button>
        <button class="btn btn-sm btn-warning fw-bold px-3" id="btnEdit1" onclick="hks_kichHoatChinhSua_fn(1)" style="display:none"><i class="bi bi-pencil-square"></i> Sửa</button>
        <button class="btn btn-sm btn-primary px-3" onclick="hks_layDuLieuPhanMot_fn()"><i class="bi bi-search"></i> Tìm</button>
        <span id="groupEdit1" class="edit-mode-btn">
          <button class="btn btn-sm btn-success px-3" onclick="hks_dayDuLieuPhanMot_fn()"><i class="bi bi-hdd-fill"></i> Cập nhật</button>
          <button class="btn btn-sm btn-secondary px-3 ms-1" onclick="hks_chenDongPhanMot_fn()"><i class="bi bi-plus-lg"></i> Thêm</button>
          <button class="btn btn-sm btn-info px-3 ms-1" id="btnChuyenLop" onclick="hks_thucHienDoiLop_fn()" style="display:none"><i class="bi bi-arrow-left-right"></i> Chuyển lớp</button>
        </span>
      </div>
    </div>
  </div>
  <div class="table-container">
    <table class="table table-bordered table-striped table-hover table-sm mb-0" id="bang1">
      <thead>
        <tr>
          <th style="min-width:50px; width:50px;">#</th>
          <th style="min-width:100px">Năm học</th><th style="min-width:60px">Lớp</th><th style="min-width:110px">CCCD</th>
          <th style="min-width:110px">Họ đệm</th><th style="min-width:60px">Tên</th>
          <th style="min-width:100px">Ngày sinh</th><th style="min-width:60px">Nam/nữ</th><th style="min-width:95px">Nơi ở (Thôn)</th><th style="min-width:200px">Thường trú (Xã/tỉnh)</th>
          <th style="min-width:80px">Dân tộc</th><th style="min-width:80px">C.Sách</th><th style="min-width:80px">K.Tật</th><th style="min-width:60px">Nghèo</th><th style="min-width:60px">Cận N</th><th style="min-width:60px">BHYT</th>
          <th style="min-width:130px">Tên Bố</th><th style="min-width:130px">Tên Mẹ</th><th style="min-width:100px">SĐT</th><th style="min-width:50px">Khẩu nơi khác</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<script>
  function hks_layDuLieuPhanMot_fn() {
    hks_hienThiManHinhTai_fn(true);
    let n = document.getElementById('t1_nam').value;
    let l = document.getElementById('t1_lop').value;
    let c = document.getElementById('t1_cccd').value.trim().toLowerCase();
    let h = document.getElementById('t1_hodem').value.trim().toLowerCase();
    let t = document.getElementById('t1_ten').value.trim().toLowerCase();

    let khoa = `${n}_${l}`;
    let isAll = hks_bienKhungHeThong_obj.hks_tapQuyenSuDung_arr?.includes('ALL');
    let canEdit = isAll || hks_bienKhungHeThong_obj.hks_tapQuyenSuDung_arr?.includes(khoa);
    if(canEdit) document.getElementById('btnEdit1').style.display = 'inline-block'; else document.getElementById('btnEdit1').style.display = 'none';

    let btnLenLop = document.getElementById('btnLenLop');
    if (btnLenLop) btnLenLop.style.display = (isAll && n !== "" && l !== "") ? 'inline-block' : 'none';

    hks_khoiPhucTrangThaiGoc_fn(1);
    
    setTimeout(() => {
        let kq = hks_khoDuLieuTong_arr.filter(r => {
            let matchNam = n ? String(r[0]) == n : true;
            let matchLop = l ? String(r[1]) == l : true;
            let matchC = c ? String(r[2]).toLowerCase().includes(c) : true;
            let matchH = h ? String(r[3]).toLowerCase().includes(h) : true;
            let matchT = t ? String(r[4]).toLowerCase().includes(t) : true;
            return matchNam && matchLop && matchC && matchH && matchT;
        });
        hks_veBangPhanMot_fn(kq);
    }, 10);
  }

  function hks_veBangPhanMot_fn(hks_duLieuBang_arr) {
    const hks_thanBang_el = document.querySelector('#bang1 tbody'); hks_thanBang_el.innerHTML = '';
    hks_duLieuBang_arr.forEach(hks_dongDuLieu_arr => hks_chenDongPhanMot_fn(hks_dongDuLieu_arr));
    hks_hienThiManHinhTai_fn(false);
  }

  function hks_danhDauChinhSua_fn(el) {
      let tr = el.closest('tr');
      if (!tr.classList.contains('hks-dong-da-sua')) {
          tr.classList.add('hks-dong-da-sua');
          let cellTen = tr.cells[5]; 
          if (cellTen) {
              let icon = document.createElement('i');
              icon.className = 'bi bi-pencil-fill hks-icon-sua';
              icon.style = 'color: #b71c1c; position: absolute; right: 4px; top: 50%; transform: translateY(-50%); font-size: 13px; z-index: 10; pointer-events: none;';
              icon.title = "Đã chỉnh sửa";
              cellTen.style.position = 'relative';
              let input = cellTen.querySelector('input');
              if(input) input.style.paddingRight = '20px';
              cellTen.appendChild(icon);
          }
      }
  }

  function hks_chenDongPhanMot_fn(hks_duLieuBang_arr = null) {
    const hks_thanBang_el = document.querySelector('#bang1 tbody');
    const hks_theDong_el = document.createElement('tr');
    
    // Thu thập mã cá biệt (nếu có dữ liệu cũ tải xuống)
    let hks_uuid_str = hks_duLieuBang_arr ? (hks_duLieuBang_arr[53] || "") : "";
    hks_theDong_el.setAttribute('data-uuid', hks_uuid_str);

    let hks_theCotXoa_el = document.createElement('td'); hks_theCotXoa_el.className = 'text-center align-middle'; 
    let hks_chuoiHtmlXoa_str = '';
    let hks_laQuanTriCapCao_bol = hks_bienKhungHeThong_obj.hks_quyenTuyetDoi_bol;
    
    if (!hks_duLieuBang_arr) {
       hks_theDong_el.classList.add('hks-dong-da-sua'); 
       let hks_hienThiXoa_str = hks_trangThaiSuaMot_bol ? 'inline-block' : 'none';
       hks_chuoiHtmlXoa_str = `<i class="bi bi-x-circle-fill text-secondary fs-6" style="cursor:pointer; display:${hks_hienThiXoa_str}" title="Hủy" onclick="this.closest('tr').remove()"></i>`;
    } else {
       let hks_chuoiSTT_str = hks_thanBang_el.rows.length + 1;
       let hks_hienThiXoa_str = (hks_trangThaiSuaMot_bol && hks_laQuanTriCapCao_bol) ? 'inline-block' : 'none'; 
       let hks_hienThiSTT_str = (hks_trangThaiSuaMot_bol && hks_laQuanTriCapCao_bol) ? 'none' : 'inline-block';
       if (hks_laQuanTriCapCao_bol) {
           let hks_chuoiDuLieu_str = JSON.stringify({ hks_truong1: hks_duLieuBang_arr[0], hks_truong2: hks_duLieuBang_arr[1], hks_truong3: hks_duLieuBang_arr[2], hks_truong4: hks_duLieuBang_arr[3], hks_truong5: hks_duLieuBang_arr[4], hks_uuid: hks_uuid_str }).replace(/"/g, "&quot;");
           hks_chuoiHtmlXoa_str = `<span class="text-muted stt-label" style="font-size:12px; display:${hks_hienThiSTT_str}">${hks_chuoiSTT_str}</span><i class="bi bi-trash3-fill text-danger fs-6 btn-xoa-nguon" style="cursor:pointer; display:${hks_hienThiXoa_str}" onclick="hks_xuLyHanhDongXoa_fn(this, ${hks_chuoiDuLieu_str})"></i>`;
       } else { hks_chuoiHtmlXoa_str = `<span class="text-muted stt-label" style="font-size:12px;">${hks_chuoiSTT_str}</span>`; }
    }
    hks_theCotXoa_el.innerHTML = hks_chuoiHtmlXoa_str; hks_theDong_el.appendChild(hks_theCotXoa_el);

    let hks_dienNamTruoc_str = !hks_duLieuBang_arr ? document.getElementById('t1_nam').value : "";
    let hks_dienLopTruoc_str = !hks_duLieuBang_arr ? document.getElementById('t1_lop').value : "";
    const hks_cauHinhCot_arr = [
      {k:'sel', o:hks_bienKhungHeThong_obj.hks_chuKyHoatDong_arr}, {k:'sel', o:hks_bienKhungHeThong_obj.hks_phomPhanLoai_arr}, 
      {k:'text'}, {k:'text'}, {k:'text'}, {k:'text'}, {k:'sel', o:['Nam','Nữ']},
      {k:'text'}, {k:'text'}, {k:'sel', o:hks_bienKhungHeThong_obj.hks_chiSoNhom_arr},
      {k:'text'}, {k:'text'}, {k:'num'}, {k:'num'}, {k:'num'},
      {k:'text'}, {k:'text'}, {k:'text'}, {k:'check'}
    ];

    let hks_voHieuHoa_bol = !hks_trangThaiSuaMot_bol;
    hks_cauHinhCot_arr.forEach((hks_thietLapCot_obj, hks_chiSoCot_num) => {
      let hks_theCot_el = document.createElement('td'); 
      let hks_giaTriCot_str = hks_duLieuBang_arr ? hks_duLieuBang_arr[hks_chiSoCot_num] : (hks_chiSoCot_num === 0 ? hks_dienNamTruoc_str : (hks_chiSoCot_num === 1 ? hks_dienLopTruoc_str : ""));
      if(hks_thietLapCot_obj.k === 'sel') {
        let hks_theChon_el = document.createElement('select'); hks_theChon_el.className = 'cell-input'; hks_theChon_el.disabled = hks_voHieuHoa_bol;
        if(hks_thietLapCot_obj.o) { hks_thietLapCot_obj.o.forEach(opt => { let hks_theTuyChon_el = document.createElement('option'); hks_theTuyChon_el.value = opt; hks_theTuyChon_el.text = opt; if(String(opt) === String(hks_giaTriCot_str)) hks_theTuyChon_el.selected = true; hks_theChon_el.add(hks_theTuyChon_el); }); }
        hks_theChon_el.addEventListener('change', function() { hks_danhDauChinhSua_fn(this); });
        hks_theCot_el.appendChild(hks_theChon_el);
      } else if (hks_thietLapCot_obj.k === 'check') {
        let hks_theHopKiem_el = document.createElement('input'); hks_theHopKiem_el.type = 'checkbox'; hks_theHopKiem_el.disabled = hks_voHieuHoa_bol;
        if(String(hks_giaTriCot_str).toLowerCase() === 'x') hks_theHopKiem_el.checked = true;
        hks_theHopKiem_el.addEventListener('change', function() { hks_danhDauChinhSua_fn(this); });
        hks_theCot_el.className = 'text-center'; hks_theCot_el.appendChild(hks_theHopKiem_el);
      } else {
        let hks_theNhap_el = document.createElement('input'); hks_theNhap_el.className = 'cell-input'; hks_theNhap_el.disabled = hks_voHieuHoa_bol;
        hks_theNhap_el.type = hks_thietLapCot_obj.k === 'date' ? 'date' : (hks_thietLapCot_obj.k === 'num' ? 'number' : 'text');
        hks_theNhap_el.value = hks_giaTriCot_str;
        if(hks_chiSoCot_num === 5) hks_theNhap_el.placeholder = "dd/mm/yyyy"; 
        hks_theNhap_el.addEventListener('input', function() { hks_danhDauChinhSua_fn(this); });
        hks_theCot_el.appendChild(hks_theNhap_el);
      }
      
      if (!hks_duLieuBang_arr && hks_chiSoCot_num === 5) {
          let icon = document.createElement('i');
          icon.className = 'bi bi-pencil-fill hks-icon-sua';
          icon.style = 'color: #b71c1c; position: absolute; right: 4px; top: 50%; transform: translateY(-50%); font-size: 13px; z-index: 10; pointer-events: none;';
          icon.title = "Thêm mới";
          hks_theCot_el.style.position = 'relative';
          let input = hks_theCot_el.querySelector('input');
          if(input) input.style.paddingRight = '20px';
          hks_theCot_el.appendChild(icon);
      }

      hks_theDong_el.appendChild(hks_theCot_el);
    });
    hks_thanBang_el.appendChild(hks_theDong_el);

    if (!hks_duLieuBang_arr) {
        let hks_khungCuon_el = hks_thanBang_el.closest('.table-container');
        if (hks_khungCuon_el) hks_khungCuon_el.scrollTop = hks_khungCuon_el.scrollHeight;
        
        setTimeout(() => {
            let hks_oHoDem_el = hks_theDong_el.cells[4].querySelector('input');
            if (hks_oHoDem_el) hks_oHoDem_el.focus();
        }, 100);
    }
  }

  function hks_xuLyHanhDongXoa_fn(hks_nutBamUI_el, hks_thongTinTruyen_obj) {
      Swal.fire({
        title: 'CẢNH BÁO BẢO MẬT!', html: `Bạn đang gửi lệnh ngắt mạch dữ liệu: <b style="color:#b71c1c;">${hks_thongTinTruyen_obj.hks_truong4} ${hks_thongTinTruyen_obj.hks_truong5}</b>?<br/>Hành động này sẽ thay đổi gốc dữ liệu.`,
        icon: 'warning', showCancelButton: true, confirmButtonColor: '#d33', cancelButtonColor: '#3085d6', confirmButtonText: 'Đồng ý'
      }).then((result) => {
        if (result.isConfirmed) {
          hks_hienThiManHinhTai_fn(true);
          hks_thucThiGiaoTiep_fn('hks_thuHoiThucThe_api', {hks_thongTinXoa_obj: hks_thongTinTruyen_obj, hks_dinhTuyenNguon_str: hks_hoSoNguoiDungHienTai_obj.reqId}).then(hks_ketQuaAPI_obj => {
              if(hks_ketQuaAPI_obj.success === false) { Swal.fire('Từ chối', 'Vượt quyền ưu tiên hệ thống!', 'warning'); hks_hienThiManHinhTai_fn(false); return; }
              if(hks_ketQuaAPI_obj.message === 'SUCCESS') { 
                  hks_capNhatBoNhoDem_fn().then(() => { Swal.fire('Hoàn tất!', 'Đã loại bỏ node.', 'success'); hks_nutBamUI_el.closest('tr').remove(); hks_hienThiManHinhTai_fn(false); });
              } else { Swal.fire('Lỗi', hks_ketQuaAPI_obj.message, 'warning'); hks_hienThiManHinhTai_fn(false); }
          }).catch(e => { Swal.fire('Lỗi', e.message, 'warning'); hks_hienThiManHinhTai_fn(false); });
        }
      });
  }

  function hks_dayDuLieuPhanMot_fn() {
    const hks_thanBang_el = document.querySelector('#bang1 tbody'); let hks_duLieuCanLuu_arr = [];
    for (let hks_theDong_el of hks_thanBang_el.rows) {
      if (hks_theDong_el.classList.contains('hks-dong-da-sua')) {
          let hks_dongDuLieu_arr = [];
          for (let i = 1; i < hks_theDong_el.cells.length; i++) {
            let hks_phanTuUI_el = hks_theDong_el.cells[i].querySelector('.cell-input, input[type="checkbox"]');
            if(hks_phanTuUI_el) {
              if(hks_phanTuUI_el.type === 'checkbox') hks_dongDuLieu_arr.push(hks_phanTuUI_el.checked ? 'x' : ''); 
              else hks_dongDuLieu_arr.push(hks_phanTuUI_el.value);
            } else hks_dongDuLieu_arr.push("");
          }
          
          hks_dongDuLieu_arr[53] = hks_theDong_el.getAttribute('data-uuid') || "";
          
          if(hks_dongDuLieu_arr[0] && hks_dongDuLieu_arr[1] && hks_dongDuLieu_arr[3] && hks_dongDuLieu_arr[4]) hks_duLieuCanLuu_arr.push(hks_dongDuLieu_arr);
      }
    }
    
    if(hks_duLieuCanLuu_arr.length === 0) { Swal.fire("Thông báo", "Chưa có bản ghi nào được chỉnh sửa!", "info"); return; }
    
    hks_hienThiManHinhTai_fn(true);
    hks_thucThiGiaoTiep_fn('hks_ghiNhanPhanHeMot_api', {hks_mangDuLieuDauVao_arr: hks_duLieuCanLuu_arr, hks_cheDo_str: 'cap_nhat', hks_dinhTuyenNguon_str: hks_hoSoNguoiDungHienTai_obj.reqId}).then(hks_ketQuaAPI_obj => { 
      if(hks_ketQuaAPI_obj.success === false) { Swal.fire('Từ chối', 'Lỗi phân luồng!', 'warning'); hks_hienThiManHinhTai_fn(false); return; }
      hks_capNhatBoNhoDem_fn().then(() => { Swal.fire("Hoàn tất!", hks_ketQuaAPI_obj.message, "success"); hks_khoiPhucTrangThaiGoc_fn(1); hks_layDuLieuPhanMot_fn(); });
    }).catch(e => { Swal.fire('Sự cố', e.message, 'warning'); hks_hienThiManHinhTai_fn(false); });
  }

  function hks_nhanBanLenLop_fn() {
      const hks_thanBang_el = document.querySelector('#bang1 tbody'); 
      if (hks_thanBang_el.rows.length === 0) {
          Swal.fire("Thông báo", "Chưa có dữ liệu học sinh nào hiển thị để lên lớp!", "info"); 
          return;
      }

      let hks_namCu = document.getElementById('t1_nam').value || "";
      let hks_lopCu = document.getElementById('t1_lop').value || "";

      if (!hks_namCu || !hks_lopCu) {
          Swal.fire("Thông báo", "Vui lòng chọn cụ thể Năm học và Lớp trên bộ lọc để thực hiện nhân bản!", "warning");
          return;
      }

      let hks_namMoi = hks_namCu;
      let namMatch = hks_namCu.match(/(\d{4})-(\d{4})/);
      if (namMatch) hks_namMoi = (parseInt(namMatch[1]) + 1) + "-" + (parseInt(namMatch[2]) + 1);

      let hks_lopMoi = hks_lopCu;
      let lopMatch = hks_lopCu.match(/^(\d+)(.*)$/);
      if (lopMatch) hks_lopMoi = (parseInt(lopMatch[1]) + 1) + lopMatch[2];

      Swal.fire({
          title: 'Xác nhận Lên lớp',
          html: `Hệ thống sẽ nhân bản toàn bộ <b style="color:#b71c1c; font-size:1.2rem;">${hks_thanBang_el.rows.length}</b> học sinh đang hiển thị.<br><br>` +
                `<div style="background:#f8f9fa; padding:10px; border-radius:5px; border:1px solid #ddd;">` +
                `Năm học: <b class="text-danger">${hks_namCu}</b> <i class="bi bi-arrow-right"></i> <b class="text-success">${hks_namMoi}</b><br>` +
                `Lớp học: <b class="text-danger">${hks_lopCu}</b> <i class="bi bi-arrow-right"></i> <b class="text-success">${hks_lopMoi}</b>` +
                `</div>`,
          icon: 'question',
          showCancelButton: true,
          confirmButtonColor: '#28a745',
          cancelButtonColor: '#6c757d',
          confirmButtonText: '<i class="bi bi-check-circle"></i> Đồng ý Nhân bản',
          cancelButtonText: 'Hủy'
      }).then((result) => {
          if (result.isConfirmed) {
              let hks_duLieuCanLuu_arr = [];
              for (let hks_theDong_el of hks_thanBang_el.rows) {
                  let hks_dongDuLieu_arr = [];
                  for (let i = 1; i < hks_theDong_el.cells.length; i++) {
                      let hks_phanTuUI_el = hks_theDong_el.cells[i].querySelector('.cell-input, input[type="checkbox"]');
                      if(hks_phanTuUI_el) {
                          if(hks_phanTuUI_el.type === 'checkbox') hks_dongDuLieu_arr.push(hks_phanTuUI_el.checked ? 'x' : ''); 
                          else hks_dongDuLieu_arr.push(hks_phanTuUI_el.value);
                      } else hks_dongDuLieu_arr.push("");
                  }
                  
                  hks_dongDuLieu_arr[0] = hks_namMoi;
                  hks_dongDuLieu_arr[1] = hks_lopMoi;
                  hks_dongDuLieu_arr[53] = ""; 
                  
                  if(hks_dongDuLieu_arr[0] && hks_dongDuLieu_arr[1]) hks_duLieuCanLuu_arr.push(hks_dongDuLieu_arr);
              }
              
              hks_hienThiManHinhTai_fn(true);
              hks_thucThiGiaoTiep_fn('hks_ghiNhanPhanHeMot_api', {hks_mangDuLieuDauVao_arr: hks_duLieuCanLuu_arr, hks_cheDo_str: 'tao_moi', hks_dinhTuyenNguon_str: hks_hoSoNguoiDungHienTai_obj.reqId}).then(hks_ketQuaAPI_obj => { 
                if(hks_ketQuaAPI_obj.success === false) { Swal.fire('Từ chối', 'Lỗi phân luồng!', 'warning'); hks_hienThiManHinhTai_fn(false); return; }
                hks_capNhatBoNhoDem_fn().then(() => { 
                    Swal.fire("Hoàn tất!", "Đã nhân bản lên lớp thành công! Vui lòng chọn lại Năm học và Lớp mới trên bộ lọc để xem kết quả.", "success"); 
                    hks_layDuLieuPhanMot_fn(); 
                });
              }).catch(e => { Swal.fire('Sự cố', e.message, 'warning'); hks_hienThiManHinhTai_fn(false); });
          }
      });
  }
  
  function hks_thucHienDoiLop_fn() {
      Swal.fire({ title: 'Cập nhật cấu trúc', text: "Đồng bộ chuyển đổi lớp cho các học sinh đã được đánh dấu chỉnh sửa?", icon: 'warning', showCancelButton: true, confirmButtonText: 'Đồng ý' }).then((result) => {
        if (result.isConfirmed) {
          const hks_thanBang_el = document.querySelector('#bang1 tbody'); let hks_duLieuCanLuu_arr = [];
          for (let hks_theDong_el of hks_thanBang_el.rows) {
            if (hks_theDong_el.classList.contains('hks-dong-da-sua')) {
                let hks_dongDuLieu_arr = [];
                for (let i = 1; i < hks_theDong_el.cells.length; i++) {
                  let hks_phanTuUI_el = hks_theDong_el.cells[i].querySelector('.cell-input, input[type="checkbox"]');
                  if(hks_phanTuUI_el) {
                    if(hks_phanTuUI_el.type === 'checkbox') hks_dongDuLieu_arr.push(hks_phanTuUI_el.checked ? 'x' : ''); 
                    else hks_dongDuLieu_arr.push(hks_phanTuUI_el.value);
                  } else hks_dongDuLieu_arr.push("");
                }
                
                hks_dongDuLieu_arr[53] = hks_theDong_el.getAttribute('data-uuid') || "";
                
                if(hks_dongDuLieu_arr[0] && hks_dongDuLieu_arr[1]) hks_duLieuCanLuu_arr.push(hks_dongDuLieu_arr);
            }
          }
          if(hks_duLieuCanLuu_arr.length === 0) { Swal.fire("Thông báo", "Vui lòng chỉnh sửa và đánh dấu ít nhất 1 học sinh để thao tác!", "info"); return; }
          
          hks_hienThiManHinhTai_fn(true);
          
          hks_thucThiGiaoTiep_fn('hks_dieuChuyenThucThe_api', {hks_mangDuLieuDauVao_arr: hks_duLieuCanLuu_arr, hks_dinhTuyenNguon_str: hks_hoSoNguoiDungHienTai_obj.reqId}).then(hks_ketQuaAPI_obj => { 
              if(hks_ketQuaAPI_obj.success === false) { Swal.fire('Từ chối', 'Mất kết nối máy chủ xác thực!', 'warning'); hks_hienThiManHinhTai_fn(false); return; }
              hks_capNhatBoNhoDem_fn().then(() => { let iconStr = hks_ketQuaAPI_obj.message.includes("thành công") ? "success" : "info"; Swal.fire("Kết quả", hks_ketQuaAPI_obj.message, iconStr); hks_khoiPhucTrangThaiGoc_fn(1); hks_layDuLieuPhanMot_fn(); });
          }).catch(e => { Swal.fire('Sự cố', e.message, 'warning'); hks_hienThiManHinhTai_fn(false); });
        }
      });
  }
</script>
