<div id="tab-search" class="tab-content">
  <div class="control-box">
    <select id="s_comboLoai" class="form-input" onchange="initSearchTable()" style="width: auto;">
      <option value="LUONG">Lương</option>
      <option value="THAMNIEN">Thâm niên</option>
    </select>
    <input type="text" id="s_hoten" class="form-input input-flexible" placeholder="Tên cán bộ..." autocomplete="off" spellcheck="false" style="max-width: 250px;" />
    <input type="text" id="s_thang" class="form-input input-flexible" placeholder="Tháng (1-12)" autocomplete="off" spellcheck="false" oninput="this.value = this.value.replace(/[^0-9]/g, ''); if(this.value > 12) this.value = 12;" maxlength="2" style="max-width: 120px;" />
    <input type="text" id="s_nam" class="form-input input-flexible" placeholder="Năm (VD: 2024)" autocomplete="off" spellcheck="false" oninput="this.value = this.value.replace(/[^0-9]/g, '');" maxlength="4" style="max-width: 140px;" />
    <button class="btn btn-primary btn-3d-effect" onclick="doSearch()">🔍 Tra cứu</button>
  </div>
  <div class="table-responsive">
    <table>
      <thead id="s_thead"></thead>
      <tbody id="s_tbody"></tbody>
    </table>
  </div>
</div>
