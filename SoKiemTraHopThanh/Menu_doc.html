<style>
  /* --- KHỐI BỐ CỤC CHUNG --- */
  .sidebar-menu { 
      width: 260px; 
      background: #1e3a8a; 
      border-right: 1px solid #172554; 
      height: 100vh; 
      position: sticky; 
      top: 0; 
      display: flex; 
      flex-direction: column; 
      box-shadow: 2px 0 10px rgba(0,0,0,0.1);
      font-family: "Times New Roman", serif;
      z-index: 1000;
  }
  .sidebar-header {
      padding: 25px 15px;
      text-align: center;
      border-bottom: 2px solid rgba(255, 255, 255, 0.1);
      margin-bottom: 15px;
  }
  .sidebar-logo {
      width: 65px;
      height: 65px;
      object-fit: contain;
      margin-bottom: 12px;
      background: #ffffff;
      border-radius: 50%;
      padding: 3px;
  }
  .sidebar-title {
      color: #ffeb3b;
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 5px;
      letter-spacing: 0.5px;
  }
  .sidebar-subtitle {
      color: #ffffff;
      font-size: 12px;
      opacity: 0.9;
  }
  .menu-list {
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      gap: 12px; /* Mở rộng khoảng cách để hiệu ứng nổi không bị chồng lấn */
      padding: 0 15px;
  }
  
  /* --- KHỐI HIỆU ỨNG NÚT BẤM (Nguồn cảm hứng: ReactBits.dev) --- */
  .menu-btn {
      background: rgba(255, 255, 255, 0.05);
      color: #e2e8f0;
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 12px 15px;
      border-radius: 10px; 
      text-align: left;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 12px;
      position: relative;
      overflow: hidden;
      /* Cấu hình transition mô phỏng gia tốc chuyển động mượt mà */
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
  }
  
  /* Hiệu ứng vệt sáng lướt qua (Shine/Glare effect) */
  .menu-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      transition: left 0.5s ease;
      z-index: 0;
  }
  
  /* Trạng thái Hover: Hiệu ứng nổi (Floating) */
  .menu-btn:hover {
      background: rgba(255, 255, 255, 0.15);
      color: #ffffff;
      transform: translateY(-4px) scale(1.02);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.2);
  }

  .menu-btn:hover::before {
      left: 100%;
  }

  .menu-btn i, .menu-btn span {
      position: relative;
      z-index: 1;
      transition: transform 0.3s ease;
  }

  /* Tạo hoạt ảnh nghiêng và phóng to nhẹ cho Icon khi Hover */
  .menu-btn:hover i {
      transform: scale(1.1) rotate(-5deg);
  }
  
  /* Trạng thái Menu đang kích hoạt */
  .menu-btn.active {
      background: #3b82f6;
      color: #ffffff;
      box-shadow: 0 4px 10px rgba(59, 130, 246, 0.4);
      border-color: #60a5fa;
  }
  
  /* --- KHỐI HIỆU ỨNG NÚT ĐĂNG XUẤT 3D --- */
  .menu-logout {
      background: linear-gradient(145deg, #ef4444, #dc2626) !important;
      color: #ffffff !important;
      border: 1px solid #f87171;
      margin-top: auto; 
      justify-content: center;
      /* Hiệu ứng hình khối 3D với viền bóng cứng */
      box-shadow: 0 4px 0 #991b1b, 0 8px 15px rgba(239, 68, 68, 0.4) !important;
      transition: all 0.2s ease !important;
  }
  
  /* Hover: Đẩy khối 3D nổi bật hơn */
  .menu-logout:hover {
      background: linear-gradient(145deg, #f87171, #ef4444) !important;
      transform: translateY(-5px) scale(1.03) !important;
      box-shadow: 0 6px 0 #991b1b, 0 15px 25px rgba(239, 68, 68, 0.5) !important;
  }

  /* Active: Cảm giác lún xuống khi Click */
  .menu-logout:active {
      transform: translateY(2px) scale(0.98) !important;
      box-shadow: 0 2px 0 #991b1b, 0 4px 10px rgba(239, 68, 68, 0.4) !important;
  }
  
  /* Icon 3D với lớp drop-shadow đa chiều */
  .menu-logout i {
      font-size: 1.2rem;
      filter: drop-shadow(1px 1px 0 #7f1d1d) drop-shadow(2px 2px 0 #7f1d1d) drop-shadow(3px 3px 0 #450a0a);
      transition: transform 0.3s ease;
  }
  
  .menu-logout:hover i {
      transform: scale(1.15) rotate(5deg);
  }

  /* --- KHỐI CHÂN MENU --- */
  .menu-bottom-section {
      padding: 20px 15px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      flex-direction: column;
      gap: 10px;
  }
  /* ========================================================================== */
  /* CẬP NHẬT GIAO DIỆN MOBILE CHO MENU (BỔ SUNG) */
  /* ========================================================================== */
  @media screen and (max-width: 768px) {
      .sidebar-menu { 
          width: 100%; 
          height: 60px; 
          position: fixed; 
          bottom: 0; 
          top: auto;
          flex-direction: row; 
          z-index: 9999;
          border-right: none;
          border-top: 1px solid #172554;
      }
      .sidebar-header, .menu-bottom-section {
          display: none !important; /* Ẩn logo và thông tin tác giả cho gọn màn hình */
      }
      .menu-list {
          display: flex;
          flex-direction: row;
          width: 100%;
          justify-content: space-around;
          align-items: center;
          padding: 0;
          margin: 0;
      }
      .menu-btn {
          flex-direction: column;
          padding: 5px;
          margin: 0;
          font-size: 10px;
          background: transparent !important;
          border-radius: 0;
          flex: 1;
      }
      .menu-btn i {
          margin-bottom: 3px;
          font-size: 18px;
          margin-right: 0 !important;
      }
      .menu-btn span {
          display: block;
          font-size: 9px;
          text-align: center;
      }
      .menu-btn.active {
          color: #ffeb3b !important;
          border-bottom: 3px solid #ffeb3b;
      }
  }
</style>

<div class="sidebar-menu">
  <div class="sidebar-header">
    <img src="" class="sidebar-logo" alt="Logo">
    <h3 class="sidebar-title" id="menu_title"></h3>
    <div class="sidebar-subtitle" id="menu_subtitle"></div>
  </div>
  
  <div class="menu-list">
      <button class="menu-btn active" onclick="chuyentth('TabNhapLieu', this)">
          <i class="bi bi-pencil-square"></i> <span>GHI SỔ KIỂM TRA</span>
      </button>
      <button class="menu-btn" onclick="chuyentth('TabTimKiem', this)">
          <i class="bi bi-search"></i> <span>THỐNG KÊ - TRA CỨU</span>
      </button>
      <button class="menu-btn" onclick="chuyentth('TabPhanQuyen', this)">
          <i class="bi bi-shield-lock"></i> <span>CẤP QUYỀN TRUY CẬP</span>
      </button>

     <button class="menu-btn menu-logout" onclick="dangxg()">
          <i class="bi bi-box-arrow-right"></i> <span>ĐĂNG XUẤT</span>
      </button>
  </div>

  <div class="menu-bottom-section">
      <div class="dev-badge-container w-100 justify-content-center" style="background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 8px 5px; box-shadow: none;">
        <div class="dev-icon-fly" style="margin-right: 8px;">🚀</div>
        <div class="dev-text-group" style="text-align: left;">
          <div class="dev-name-label" id="menu_author" style="font-size: 10px;"></div>
          <div class="dev-role-label" style="font-size: 8px;">Thiết kế & Phát triển</div>
        </div>
      </div>
  </div>
</div>
