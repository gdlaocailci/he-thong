<style>
  .sidebar-menu { 
      width: 260px; 
      background: #1e3a8a; 
      border-right: 1px solid #172554; 
      height: 100vh; 
      position: sticky; 
      top: 0; 
      display: flex; 
      flex-direction: column; 
      box-shadow: 2px 0 10px rgba(0,0,0,0.1);
      font-family: "Times New Roman", serif;
      z-index: 1000;
  }
  .sidebar-header {
      padding: 25px 15px;
      text-align: center;
      border-bottom: 2px solid rgba(255, 255, 255, 0.1);
      margin-bottom: 15px;
  }
  .sidebar-logo {
      width: 65px;
      height: 65px;
      object-fit: contain;
      margin-bottom: 12px;
      background: #ffffff;
      border-radius: 50%;
      padding: 3px;
  }
  .sidebar-title {
      color: #ffeb3b;
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 5px;
      letter-spacing: 0.5px;
  }
  .sidebar-subtitle {
      color: #ffffff;
      font-size: 12px;
      opacity: 0.9;
  }
  .menu-list {
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      gap: 5px;
      padding: 0 15px;
  }
  
  /* HIỆU ỨNG NÚT BẤM (CẢM HỨNG TỪ REACTBITS) */
  .menu-btn {
      background: transparent;
      color: #e2e8f0;
      border: none;
      padding: 12px 15px;
      border-radius: 8px;
      text-align: left;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      position: relative;
      overflow: hidden;
      transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), background 0.3s, color 0.3s;
  }
  
  .menu-btn::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      transition: width 0.4s ease-out, height 0.4s ease-out;
      z-index: 0;
  }
  
  .menu-btn:hover::before {
      width: 300px;
      height: 300px;
  }

  .menu-btn i, .menu-btn span {
      position: relative;
      z-index: 1;
  }

  .menu-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      color: #ffffff;
      transform: scale(1.02) translateX(3px);
  }
  
  .menu-btn.active {
      background: #3b82f6;
      color: #ffffff;
      box-shadow: 0 4px 10px rgba(59, 130, 246, 0.4);
  }
  
  .menu-logout {
      color: #fca5a5 !important;
  }
  
  .menu-logout:hover {
      background: rgba(239, 68, 68, 0.1) !important;
      color: #fef2f2 !important;
      box-shadow: 0 4px 10px rgba(239, 68, 68, 0.3);
  }
  
  .menu-bottom-section {
      padding: 20px 15px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      flex-direction: column;
      gap: 10px;
  }
</style>

<div class="sidebar-menu">
  <div class="sidebar-header">
    <img src="" class="sidebar-logo" alt="Logo">
    <h3 class="sidebar-title" id="menu_title"></h3>
    <div class="sidebar-subtitle" id="menu_subtitle"></div>
  </div>
  
  <div class="menu-list">
      <button class="menu-btn active" onclick="chuyentth('TabNhapLieu', this)">
          <i class="bi bi-pencil-square"></i> <span>GHI SỔ KIỂM TRA</span>
      </button>
      <button class="menu-btn" onclick="chuyentth('TabTimKiem', this)">
          <i class="bi bi-search"></i> <span>THỐNG KÊ - TRA CỨU</span>
      </button>
      <button class="menu-btn" onclick="chuyentth('TabPhanQuyen', this)">
          <i class="bi bi-shield-lock"></i> <span>CẤP QUYỀN TRUY CẬP</span>
      </button>

     <button class="menu-btn menu-logout" onclick="dangxg()" style="margin-top: auto; justify-content: center;">
          <i class="bi bi-box-arrow-right"></i> <span>ĐĂNG XUẤT</span>
      </button>
  </div>

  <div class="menu-bottom-section">
      <div class="dev-badge-container w-100 justify-content-center" style="background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 8px 5px; box-shadow: none;">
        <div class="dev-icon-fly" style="margin-right: 8px;">🚀</div>
        <div class="dev-text-group" style="text-align: left;">
          <div class="dev-name-label" id="menu_author" style="font-size: 10px;"></div>
          <div class="dev-role-label" style="font-size: 8px;">Thiết kế & Phát triển</div>
        </div>
      </div>
  </div>
</div>
