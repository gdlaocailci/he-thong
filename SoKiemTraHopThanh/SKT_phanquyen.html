<style>
  .pq-container {
    background: #fff;
    border-radius: 8px;
    padding: 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    font-family: "Times New Roman", serif;
  }
  .pq-header {
    border-left: 5px solid #b91c1c;
    padding-left: 15px;
    margin-bottom: 20px;
  }
  .pq-header h3 {
    margin: 0;
    color: #1e3a8a;
    font-weight: bold;
    font-size: 20px;
  }
  .pq-header p {
    margin: 5px 0 0;
    color: #475569;
    font-size: 14px;
  }
  .pq-tabs {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    border-bottom: 1px solid #e2e8f0;
    padding-bottom: 10px;
  }
  .pq-tab-btn {
    padding: 8px 20px;
    border: none;
    background: transparent;
    font-weight: bold;
    color: #64748b;
    cursor: pointer;
    border-radius: 6px 6px 0 0;
    transition: 0.2s;
    font-size: 15px;
  }
  .pq-tab-btn.active {
    background: #1e3a8a;
    color: #fff;
  }
  .pq-tab-btn:hover:not(.active) {
    background: #f1f5f9;
  }
  .pq-tab-pane {
    display: none;
  }
  .pq-tab-pane.active {
    display: block;
  }
  .pq-toolbar {
    display: flex;
    flex-wrap: wrap;
    gap: 15px;
    align-items: center;
    margin-bottom: 15px;
  }
  .pq-toolbar label {
    font-weight: bold;
    font-size: 14px;
    color: #1e3a8a;
  }
  .pq-toolbar input {
    border: 1px solid #cbd5e1;
    border-radius: 4px;
    padding: 6px 10px;
    width: 200px;
  }
  .pq-table-wrap {
    border: 1px solid #cbd5e1;
    border-radius: 6px;
    overflow: auto;
    max-height: 55vh;
  }
  .pq-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
  }
  .pq-table th {
    background: #f1f5f9;
    position: sticky;
    top: 0;
    z-index: 5;
    padding: 8px 6px;
    text-align: center;
    border: 1px solid #cbd5e1;
    font-weight: bold;
    color: #1e3a8a;
  }
  .pq-table td {
    padding: 4px 6px;
    border: 1px solid #cbd5e1;
    vertical-align: middle;
  }
  .pq-table input, .pq-table select {
    width: 100%;
    border: none;
    background: transparent;
    padding: 6px 4px;
    box-sizing: border-box;
    font-size: 14px;
    font-family: "Times New Roman", serif;
  }
  .pq-table input:focus, .pq-table select:focus {
    outline: 2px solid #3b82f6;
    background: #fff;
  }
  .pq-table .del-btn {
    background: #fee2e2;
    border: none;
    border-radius: 4px;
    padding: 2px 10px;
    cursor: pointer;
    color: #b91c1c;
    font-weight: bold;
    font-size: 14px;
  }
  .pq-table .del-btn:hover {
    background: #fecaca;
  }
  .pq-actions {
    margin-top: 15px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
  }
  .pq-btn {
    padding: 8px 20px;
    border: none;
    border-radius: 6px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
    font-size: 14px;
  }
  .pq-btn-primary {
    background: #1e3a8a;
    color: #fff;
  }
  .pq-btn-primary:hover {
    background: #1e40af;
  }
  .pq-btn-success {
    background: #059669;
    color: #fff;
  }
  .pq-btn-success:hover {
    background: #047857;
  }
  .pq-btn-danger {
    background: #dc2626;
    color: #fff;
  }
  .pq-btn-danger:hover {
    background: #b91c1c;
  }
  .pq-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }
  .pq-msg {
    padding: 10px 15px;
    border-radius: 4px;
    margin-top: 10px;
    display: none;
    font-weight: bold;
  }
  .pq-msg.error {
    background: #fee2e2;
    color: #b91c1c;
    border: 1px solid #fecaca;
    display: block;
  }
  .pq-msg.success {
    background: #d1fae5;
    color: #065f46;
    border: 1px solid #a7f3d0;
    display: block;
  }
  .pq-msg.info {
    background: #dbeafe;
    color: #1e40af;
    border: 1px solid #bfdbfe;
    display: block;
  }
  .pq-note {
    font-size: 13px;
    color: #64748b;
    font-style: italic;
    margin-top: 5px;
  }
</style>

<div class="pq-container">
  <div class="pq-header">
    <h3>🔑 QUẢN LÝ PHÂN QUYỀN TRUY CẬP</h3>
    <p>Chỉ những người có quyền <b>xx</b> hoặc <b>xxx</b> mới được truy cập trang này.</p>
  </div>

  <div class="pq-tabs">
    <button class="pq-tab-btn active" data-tab="tabPhanQuyen" onclick="switchPQTab('tabPhanQuyen')">Phân quyền</button>
    <button class="pq-tab-btn" data-tab="tabBoPhan" onclick="switchPQTab('tabBoPhan')">Bộ phận</button>
  </div>

  <!-- TAB PHÂN QUYỀN -->
  <div id="tabPhanQuyen" class="pq-tab-pane active">
    <div class="pq-toolbar">
      <label>Phạm vi: <input type="text" id="pq_phamvi" placeholder="VD: ALL"></label>
      <label>ID thư mục: <input type="text" id="pq_cai_tui" placeholder="ID thư mục tài nguyên"></label>
    </div>
    <div class="pq-table-wrap">
      <table class="pq-table">
        <thead>
          <tr>
            <th style="width:30px;">#</th>
            <th style="width:30px;"><button class="del-btn" onclick="xoaDongPQ(this)" title="Xóa dòng">🗑️</button></th>
            <th style="min-width:130px;">Tên</th>
            <th style="min-width:130px;">Tài khoản</th>
            <th style="min-width:110px;">Quyền</th>
          </tr>
        </thead>
        <tbody id="pqBody">
          <!-- Dữ liệu sẽ được load -->
        </tbody>
      </table>
    </div>
    <div class="pq-actions">
      <button class="pq-btn pq-btn-primary" onclick="themDongPQ()">➕ Thêm dòng</button>
      <button class="pq-btn pq-btn-success" onclick="luuPhanQuyen()">💾 Lưu phân quyền</button>
      <span id="pqStatus" class="pq-msg"></span>
    </div>
    <div class="pq-note">* Lưu ý: Phải có ít nhất một tài khoản có quyền <b>xx</b> để quản lý phân quyền.</div>
  </div>

  <!-- TAB BỘ PHẬN -->
  <div id="tabBoPhan" class="pq-tab-pane">
    <div class="pq-table-wrap">
      <table class="pq-table">
        <thead>
          <tr>
            <th style="width:30px;">#</th>
            <th style="width:30px;"><button class="del-btn" onclick="xoaDongBP(this)" title="Xóa dòng">🗑️</button></th>
            <th style="min-width:150px;">Mã bộ phận</th>
            <th style="min-width:200px;">Tên bộ phận</th>
          </tr>
        </thead>
        <tbody id="bpBody">
          <!-- Dữ liệu sẽ được load -->
        </tbody>
      </table>
    </div>
    <div class="pq-actions">
      <button class="pq-btn pq-btn-primary" onclick="themDongBP()">➕ Thêm dòng</button>
      <button class="pq-btn pq-btn-success" onclick="luuBoPhan()">💾 Lưu bộ phận</button>
      <span id="bpStatus" class="pq-msg"></span>
    </div>
  </div>
</div>

<script>
// === KIỂM TRA QUYỀN TRUY CẬP ===
(function() {
  const quyen = window.sktquyenht || '';
  if (!(quyen === 'xx' || quyen === 'xxx')) {
    document.querySelector('.pq-container').innerHTML = `
      <div style="padding:40px; text-align:center; color:#b91c1c; font-size:18px; font-weight:bold;">
        ⛔ BẠN KHÔNG CÓ QUYỀN TRUY CẬP<br>
        <span style="font-size:14px; color:#475569;">Chỉ người dùng có quyền <b>xx</b> hoặc <b>xxx</b> mới được sử dụng.</span>
      </div>
    `;
    return;
  }
  taiDuLieuPhanQuyen();
  taiDuLieuBoPhan();
})();

// === PHÂN QUYỀN ===
function taiDuLieuPhanQuyen() {
  google.script.run
    .withSuccessHandler(function(data) {
      if (data.tcon) {
        document.getElementById('pq_phamvi').value = data.phamvi || '';
        document.getElementById('pq_cai_tui').value = data.cai_tui_do || '';
        hienBangPQ(data.dlieu || []);
      } else {
        hienThongBao('pqStatus', data.tbao, 'error');
      }
    })
    .withFailureHandler(function(err) {
      hienThongBao('pqStatus', 'Lỗi tải: ' + err.message, 'error');
    })
    .skt_lay_phanquyen();
}

function hienBangPQ(ds) {
  const tbody = document.getElementById('pqBody');
  tbody.innerHTML = '';
  if (!ds || ds.length === 0) ds = [['', '', '']];
  ds.forEach(function(row, i) {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td style="text-align:center;">${i+1}</td>
      <td style="text-align:center;"><button class="del-btn" onclick="xoaDongPQ(this)">🗑️</button></td>
      <td><input type="text" class="pq-ten" value="${row[0]||''}" placeholder="Họ tên"></td>
      <td><input type="text" class="pq-taik" value="${row[1]||''}" placeholder="Email"></td>
      <td>
        <select class="pq-quyen">
          <option value="">--</option>
          <option value="x" ${row[2]==='x'?'selected':''}>x (Kiểm tra)</option>
          <option value="xx" ${row[2]==='xx'?'selected':''}>xx (Quản lý PQ)</option>
          <option value="xxx" ${row[2]==='xxx'?'selected':''}>xxx (Toàn quyền)</option>
        </select>
      </td>
    `;
    tbody.appendChild(tr);
  });
}

function themDongPQ() {
  const tbody = document.getElementById('pqBody');
  const stt = tbody.children.length + 1;
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td style="text-align:center;">${stt}</td>
    <td style="text-align:center;"><button class="del-btn" onclick="xoaDongPQ(this)">🗑️</button></td>
    <td><input type="text" class="pq-ten" placeholder="Họ tên"></td>
    <td><input type="text" class="pq-taik" placeholder="Email"></td>
    <td>
      <select class="pq-quyen">
        <option value="">--</option>
        <option value="x">x (Kiểm tra)</option>
        <option value="xx">xx (Quản lý PQ)</option>
        <option value="xxx">xxx (Toàn quyền)</option>
      </select>
    </td>
  `;
  tbody.appendChild(tr);
  capNhatSTT('pqBody');
}

function xoaDongPQ(btn) {
  const tr = btn.closest('tr');
  if (tr && tr.parentNode.children.length > 1) {
    tr.remove();
    capNhatSTT('pqBody');
  } else {
    alert('Phải giữ lại ít nhất một dòng.');
  }
}

function capNhatSTT(tbodyId) {
  const rows = document.getElementById(tbodyId).children;
  for (let i = 0; i < rows.length; i++) {
    rows[i].cells[0].innerText = i + 1;
  }
}

function luuPhanQuyen() {
  const phamvi = document.getElementById('pq_phamvi').value.trim();
  const cai_tui = document.getElementById('pq_cai_tui').value.trim();
  const mang = [];
  const rows = document.getElementById('pqBody').children;
  let coXX = false;
  for (let i = 0; i < rows.length; i++) {
    const ten = rows[i].querySelector('.pq-ten').value.trim();
    const taik = rows[i].querySelector('.pq-taik').value.trim();
    const quyen = rows[i].querySelector('.pq-quyen').value;
    if (taik !== '') {
      mang.push([ten, taik, quyen]);
      if (quyen === 'xx') coXX = true;
    }
  }
  if (mang.length === 0) {
    hienThongBao('pqStatus', 'Danh sách trống!', 'error');
    return;
  }
  if (!coXX) {
    hienThongBao('pqStatus', 'Lỗi: Phải có ít nhất một tài khoản quyền "xx"!', 'error');
    return;
  }
  hienThongBao('pqStatus', '⏳ Đang lưu...', 'info');
  google.script.run
    .withSuccessHandler(function(kq) {
      if (kq.tcon) {
        hienThongBao('pqStatus', kq.tbao, 'success');
        taiDuLieuPhanQuyen();
      } else {
        hienThongBao('pqStatus', kq.tbao, 'error');
      }
    })
    .withFailureHandler(function(err) {
      hienThongBao('pqStatus', 'Lỗi: ' + err.message, 'error');
    })
    .skt_luu_phanquyen(phamvi, cai_tui, mang);
}

// === BỘ PHẬN ===
function taiDuLieuBoPhan() {
  google.script.run
    .withSuccessHandler(function(data) {
      if (data.tcon) {
        hienBangBP(data.dlieu || []);
      } else {
        hienThongBao('bpStatus', data.tbao, 'error');
      }
    })
    .withFailureHandler(function(err) {
      hienThongBao('bpStatus', 'Lỗi tải: ' + err.message, 'error');
    })
    .skt_lay_bophan();
}

function hienBangBP(ds) {
  const tbody = document.getElementById('bpBody');
  tbody.innerHTML = '';
  if (!ds || ds.length === 0) ds = [['', '']];
  ds.forEach(function(row, i) {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td style="text-align:center;">${i+1}</td>
      <td style="text-align:center;"><button class="del-btn" onclick="xoaDongBP(this)">🗑️</button></td>
      <td><input type="text" class="bp-ma" value="${row[0]||''}" placeholder="Mã BP"></td>
      <td><input type="text" class="bp-ten" value="${row[1]||''}" placeholder="Tên bộ phận"></td>
    `;
    tbody.appendChild(tr);
  });
}

function themDongBP() {
  const tbody = document.getElementById('bpBody');
  const stt = tbody.children.length + 1;
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td style="text-align:center;">${stt}</td>
    <td style="text-align:center;"><button class="del-btn" onclick="xoaDongBP(this)">🗑️</button></td>
    <td><input type="text" class="bp-ma" placeholder="Mã BP"></td>
    <td><input type="text" class="bp-ten" placeholder="Tên bộ phận"></td>
  `;
  tbody.appendChild(tr);
  capNhatSTT('bpBody');
}

function xoaDongBP(btn) {
  const tr = btn.closest('tr');
  if (tr && tr.parentNode.children.length > 1) {
    tr.remove();
    capNhatSTT('bpBody');
  } else {
    alert('Phải giữ lại ít nhất một dòng.');
  }
}

function luuBoPhan() {
  const mang = [];
  const rows = document.getElementById('bpBody').children;
  for (let i = 0; i < rows.length; i++) {
    const ma = rows[i].querySelector('.bp-ma').value.trim();
    const ten = rows[i].querySelector('.bp-ten').value.trim();
    if (ma !== '' && ten !== '') mang.push([ma, ten]);
  }
  if (mang.length === 0) {
    hienThongBao('bpStatus', 'Danh sách bộ phận trống!', 'error');
    return;
  }
  hienThongBao('bpStatus', '⏳ Đang lưu...', 'info');
  google.script.run
    .withSuccessHandler(function(kq) {
      if (kq.tcon) {
        hienThongBao('bpStatus', kq.tbao, 'success');
        taiDuLieuBoPhan();
      } else {
        hienThongBao('bpStatus', kq.tbao, 'error');
      }
    })
    .withFailureHandler(function(err) {
      hienThongBao('bpStatus', 'Lỗi: ' + err.message, 'error');
    })
    .skt_luu_bophan(mang);
}

// === TIỆN ÍCH ===
function hienThongBao(id, msg, type) {
  const el = document.getElementById(id);
  el.className = 'pq-msg ' + (type || 'info');
  el.innerText = msg;
  el.style.display = 'block';
  if (type === 'success' || type === 'error') {
    setTimeout(function() { el.style.display = 'none'; }, 5000);
  }
}

function switchPQTab(tabId) {
  document.querySelectorAll('.pq-tab-pane').forEach(el => el.classList.remove('active'));
  document.getElementById(tabId).classList.add('active');
  document.querySelectorAll('.pq-tab-btn').forEach(btn => btn.classList.remove('active'));
  document.querySelector(`.pq-tab-btn[data-tab="${tabId}"]`).classList.add('active');
}
</script>
